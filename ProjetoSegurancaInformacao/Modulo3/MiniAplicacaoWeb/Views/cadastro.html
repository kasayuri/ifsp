<div class='row justify-content-center'>
    <div class='col-md-6'>
        <div class='card shadow-sm'>
            <div class='card-header text-center bg-primary text-white'>
                <h3>Cadastro de Usuários</h3>
            </div>
            <div class='card-body'>
                <form method='post' action='/cadastro'>
                    <input type='hidden' name='{{TokenName}}' value='{{TokenValue}}' />
                    <div class='mb-3'>
                        <label class='form-label'>Login:</label>
                        <input class='form-control' name='login' required />
                    </div>
                    <div class='mb-3'>
                        <label class='form-label'>Senha:</label>
                        <input class='form-control' name='senha' type='password' required />
                    </div>
                    <div class='mb-3'>
                        <label class='form-label'>Tipo:</label>
                        <select class='form-select' name='tipo'>
                            <option value='Admin'>Usuário Administrador</option>
                            <option value='Comum'>Usuário Comum</option>
                        </select>
                    </div>
                    <button class='btn btn-success w-100' type='submit'>Cadastrar</button>
                </form>
                <div class='mt-3 text-center'>
                    <a href='/administradores' class='text-decoration-none'>Voltar para área restrita (administradores)</a>
                </div>
            </div>
        </div>
    </div>
</div>
